map $http_x_forwarded_proto $vika_https_client {
    https 1;
    default 0;
}

server {
    listen 80;
    server_name vikavasilieva.ru www.vikavasilieva.ru 803820a5872d.vps.myjino.ru;

    client_max_body_size 25m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Загруженные фото отдаём прямо с диска (Next.js standalone не сервирует runtime-файлы)
    location ^~ /uploads/ {
        alias /opt/quiet-dialogue/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        # Если запрос пришёл через Jino-HTTPS-прокси — обслуживаем как HTTPS
        # Если прямой HTTP — редиректим на https (только когда сертификат уже есть)
        # Раскомментировать после получения сертификата:
        #if ($vika_https_client = 0) {
        #    return 301 https://vikavasilieva.ru$request_uri;
        #}
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
