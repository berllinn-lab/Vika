name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HOST_PORT: ${{ secrets.HOST_PORT }}
          SESSION_PASSWORD: ${{ secrets.SESSION_PASSWORD }}
          ADMIN_LOGIN: ${{ secrets.ADMIN_LOGIN }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          IG_SYNC_SECRET: ${{ secrets.IG_SYNC_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          envs: GH_TOKEN,GH_REPO,HOST_PORT,SESSION_PASSWORD,ADMIN_LOGIN,ADMIN_PASSWORD_HASH,APIFY_TOKEN,IG_SYNC_SECRET,TELEGRAM_BOT_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/opt/quiet-dialogue
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            CLONE_URL="https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

            if [ ! -d .git ]; then
              git clone "$CLONE_URL" .
            else
              git remote set-url origin "$CLONE_URL"
              git fetch --all --prune
              git reset --hard origin/main
            fi

            # .env пишется атомарно одной командой через printf, чтобы drone-ssh
            # не вставлял свои проверки exit-кода между строками heredoc.
            # $ в значениях экранируем как $$, иначе docker compose съест их при interpolation.
            ESC_HASH=$(printf '%s' "$ADMIN_PASSWORD_HASH" | sed 's/\$/$$/g')
            umask 077
            printf 'HOST_PORT=%s\nSESSION_PASSWORD=%s\nADMIN_LOGIN=%s\nADMIN_PASSWORD_HASH=%s\nAPIFY_TOKEN=%s\nIG_SYNC_SECRET=%s\nIG_USERNAME=time_prenatal\nTELEGRAM_BOT_TOKEN=%s\n' \
              "$HOST_PORT" "$SESSION_PASSWORD" "$ADMIN_LOGIN" "$ESC_HASH" "$APIFY_TOKEN" "$IG_SYNC_SECRET" "$TELEGRAM_BOT_TOKEN" > .env

            umask 022

            mkdir -p data public/uploads
            chown -R 1001:1001 data public/uploads

            if [ -f data/site.db ]; then
              mkdir -p backups
              cp data/site.db "backups/site-$(date +%Y%m%d-%H%M%S).db"
              ls -1t backups/site-*.db | tail -n +21 | xargs -r rm --
            fi

            docker compose up -d --build
            docker image prune -f

            # nginx reverse-proxy (провайдер снаружи пускает только 80/443)
            if [ -f deploy/nginx/vika.conf ] && [ -d /etc/nginx/conf.d ]; then
              install -m 0644 deploy/nginx/vika.conf /etc/nginx/conf.d/vika.conf
              nginx -t && systemctl reload nginx
            fi

            git remote set-url origin "https://github.com/${GH_REPO}.git"
