name: Instagram Sync
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Instagram sync
        run: |
          curl -fsS -X POST \
            -H "x-sync-secret: ${{ secrets.IG_SYNC_SECRET }}" \
            "https://803820a5872d.vps.myjino.ru/api/instagram-sync"
