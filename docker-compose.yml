services:
  web:
    build: .
    image: quiet-dialogue:latest
    container_name: quiet-dialogue
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
